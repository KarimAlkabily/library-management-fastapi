services:
  app:
    build: .
    container_name: library_app
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:1975@db:5432/library_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  db:
    image: postgres:15
    container_name: library_db
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1975
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: library_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: